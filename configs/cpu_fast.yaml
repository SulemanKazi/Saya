# Fast config for CPU testing — reduced resolution and epoch count
# Uses 64x64 images so each training step covers a larger fraction of pixels.

model:
  n_layers: 4
  hidden_dim: 128
  pos_enc_levels: 4

render:
  rays_per_pixel: 16      # more samples per ray for better gradient signal
  frustum_truncation: true
  bbox_min: [-0.5, -0.5, -0.5]
  bbox_max: [0.5, 0.5, 0.5]

loss:
  beta_ren: 1.0
  beta_coh: 0.05
  beta_smo: 0.0           # disabled — second-order gradients are unstable on small CPU models
  beta_vol: 0.01
  beta_bin: 0.05
  grad_threshold: 0.01
  vol_sigmoid_beta: 100.0
  n_vol_samples: 128
  n_smo_samples: 32

train:
  epochs: 20
  lr: 0.0005
  lr_light: 0.002
  batch_size_rays: 512
  img_size: 64            # 64x64 images → each step sees ~12% of all pixels
  seed: 42
  checkpoint_every: 10
  log_every: 5
  use_registration: false

mesh:
  grid_resolution: 50
  iso_threshold: 0.5
  output_format: obj
  eval_batch_size: 4096

device: cpu
