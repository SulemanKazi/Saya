# Fast config for CPU testing — reduced resolution and epoch count
# Uses 64x64 images so each training step covers a larger fraction of pixels.

model:
  n_layers: 4
  hidden_dim: 128
  pos_enc_levels: 4

render:
  n_samples_per_ray: 32   # fewer than n = w for speed
  frustum_truncation: true
  bbox_min: [-0.5, -0.5, -0.5]
  bbox_max: [0.5, 0.5, 0.5]

loss:
  beta_ren: 1.0
  beta_coh: 0.001
  beta_smo: 0.0001        # finite-difference gradients are stable on CPU too
  beta_vol: 0.0001
  beta_bin: 0.05
  grad_threshold: 0.4     # θ in Eq. 11 (threshold is θ·w with w = img_size)
  vol_sigmoid_beta: 100.0
  smo_k1: 26
  smo_k2: 6
  n_smo_samples: 256
  beta_con: 0.01
  con_grid: 32            # 32³ keeps the flood fill cheap on CPU
  con_every: 20
  con_start_epoch: 5

train:
  epochs: 20
  lr: 0.0005
  lr_light: 0.002
  batch_size_rays: 512
  img_size: 64            # 64x64 images → each step sees ~12% of all pixels
  seed: 42
  checkpoint_every: 10
  log_every: 5
  use_registration: false
  registration_every: 5

mesh:
  grid_resolution: 50
  iso_threshold: 0.5
  output_format: obj
  eval_batch_size: 4096

device: cpu
