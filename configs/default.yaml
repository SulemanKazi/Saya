# Neural Shadow Art — default hyperparameters (Pacific Graphics 2025)

model:
  n_layers: 8           # total FC layers incl. sigmoid output (paper: 8)
  hidden_dim: 256       # channels per layer
  pos_enc_levels: 6     # L in positional encoding (Eq. 2); output dim = 3*(1+2*L)
  init_bias: -6.0       # initial occupancy logit — field must start near-empty

render:
  n_samples_per_ray: null  # null → n = w (image width), as in the paper
  frustum_truncation: true
  bbox_min: [-0.5, -0.5, -0.5]   # scene bounding box
  bbox_max: [0.5, 0.5, 0.5]

loss:
  beta_ren: 1.0           # rendering loss weight (β₀)
  beta_coh: 0.001         # cohesion base weight (β₁ = 10⁻³, scaled by 2^min(epoch,3))
  beta_smo: 0.0001        # smoothness weight (β₂ = 10⁻⁴, activates after epoch 3)
  beta_vol: 0.0001        # volume weight (β₃ = 10⁻⁴, activates after epoch 3)
  beta_bin: 0.05          # binarization base weight (β₄ = 5×10⁻², scaled by 2^min(epoch,3))
  grad_threshold: 0.4     # θ in Eq. 11; surface points satisfy ‖∇f‖ > θ·w
  vol_sigmoid_beta: 100.0 # 1/T: sharpness of the soft switch in L_vol (Eq. 15)
  smo_k1: 26              # k₁ neighbors for finite-difference gradients (Eq. 13)
  smo_k2: 6               # k₂ nearest surface neighbors (Eq. 14)
  n_smo_samples: 1024     # max surface candidates per step (cost cap for L_smo)

train:
  epochs: 30
  lr: 0.0001            # MLP learning rate
  lr_light: 0.001       # learning rate for light dirs and screen normals
  batch_size_rays: 1024 # total rays per gradient step (split evenly across views)
  seed: 42
  checkpoint_every: 5   # save checkpoint every N epochs
  log_every: 10         # print loss every N steps
  use_registration: false  # enable ICP registration for incompatible silhouettes
  registration_every: 5    # run registration every N epochs (paper Sec. 3.3)

mesh:
  grid_resolution: 200  # Marching Cubes grid size per axis (paper uses 200)
  iso_threshold: 0.5    # τ: occupancy threshold for surface extraction
  output_format: stl    # stl | obj | ply
  eval_batch_size: 32768  # MLP evaluation batch size for grid (tune for OOM)

device: auto  # auto | cuda | mps | cpu
